name: Scrape Loto (polla.cl) [DESACTIVADO]

# polla.cl bloquea las IPs de GitHub Actions → este workflow no funciona en CI.
# El flujo correcto es correr scripts/actualizar_loto.ps1 localmente
# después de cada sorteo (mar/jue/dom ~22:15 CLT) y hacer push manual.
#
# Workflow desactivado: sin triggers, no se puede disparar desde la UI ni por cron.
on:
  workflow_dispatch:
    inputs:
      DISABLED:
        description: "Este workflow está desactivado. Usar actualizar_loto.ps1 localmente."
        required: true
        default: "Cancelar"

permissions:
  contents: write # Necesario para commitear los CSV actualizados

jobs:
  scrape-loto:
    if: false  # DESACTIVADO: polla.cl bloquea IPs de GitHub. Usar actualizar_loto.ps1 local.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Instalar Chromium para Playwright
        run: playwright install chromium --with-deps

      - name: Ejecutar scraper polla.cl
        # NOTA: polla.cl bloquea IPs de GitHub Actions.
        # El scraper saldrá con código 0 (sin datos nuevos) pero sin error fatal.
        run: python src/scrapers/scraper_polla.py

      - name: Calcular métricas y sugerencias (Loto)
        run: python src/analytics/metrics.py --game loto

      - name: Actualizar pozos estimados
        # polla.cl bloquea IPs de GitHub → este paso fallará en CI; no es crítico.
        # El pozo de Kino (rckino.loteria.cl) sí se actualiza correctamente.
        continue-on-error: true
        run: python src/scrapers/fetch_pozos.py

      - name: Commit y push de datos actualizados
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data(loto): actualizar historial [${{ github.run_id }}]"
          file_pattern: "data/polla_historial.csv docs/data/loto_metrics.json docs/data/pozos.json"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
