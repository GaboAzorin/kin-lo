name: Kino manual (ingreso en vivo)

# Se dispara desde la página /ingresar/ vía repository_dispatch (event_type: kino-manual).
# Agrega una fila PROVISIONAL del Kino (solo 14 números) al CSV, recalcula métricas
# y commitea. ReKino/RequeteKino los completa después scrape-kino.yml en su corrida.
on:
  repository_dispatch:
    types: [kino-manual]

permissions:
  contents: write

jobs:
  agregar-sorteo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Agregar sorteo manual al CSV (provisional)
        env:
          PAYLOAD: ${{ toJSON(github.event.client_payload) }}
        run: python src/scrapers/agregar_sorteo_manual.py

      - name: Calcular métricas y sugerencias (Kino)
        run: python src/analytics/metrics.py --game kino
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Actualizar pozos estimados
        continue-on-error: true
        run: python src/scrapers/fetch_pozos.py

      - name: Commit y push de datos actualizados
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data(kino): sorteo manual #${{ github.event.client_payload.sorteo }} (provisional)"
          file_pattern: "data/loteria_historial.csv docs/data/kino_metrics.json docs/data/pozos.json data/kino_suggestions_pending.json data/suggestions_history.csv docs/data/suggestions_history.json docs/data/suggestions_detail.json data/jugadas.json docs/data/historial_index.json"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
