name: Scrape Kino (loteria.cl)

# Horario de sorteos: miércoles, viernes y domingos a las 22:30 CLT.
# Resultados seguros desde las 23:59 CLT.
# CLT = UTC-4 (invierno) → 23:59 CLT = 03:59 UTC del día siguiente.
# Días del job (día siguiente al sorteo): jueves=4, sábado=6, lunes=1.
on:
  schedule:
    - cron: "59 3 * * 4,6,1"
  workflow_dispatch: # Permite ejecución manual desde la UI de GitHub

permissions:
  contents: write

jobs:
  scrape-kino:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt
        # Si el scraper de loteria.cl requiere JS rendering (DynamicFetcher),
        # descomentar la línea siguiente:
        # run: pip install -r requirements.txt && scrapling install

      - name: Ejecutar scraper loteria.cl (últimos 26 sorteos vía API oficial)
        run: python src/scrapers/scraper_loteria.py

      - name: Ejecutar scraper kinohistorico.cl (historial completo vía REST API)
        # Descarga sorteos nuevos que aún no estén en el CSV.
        # continue-on-error: kinohistorico.cl bloquea IPs de GitHub Actions con 403.
        continue-on-error: true
        run: python src/scrapers/scraper_kinohistorico.py

      - name: Calcular métricas y sugerencias (Kino)
        run: python src/analytics/metrics.py --game kino
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Actualizar pozos estimados
        # rckino.loteria.cl no bloquea IPs → Kino siempre OK.
        # polla.cl bloquea IPs de GitHub → la sección Loto fallará; continue-on-error lo maneja.
        continue-on-error: true
        run: python src/scrapers/fetch_pozos.py

      - name: Commit y push de datos actualizados
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data(kino): actualizar historial [${{ github.run_id }}]"
          file_pattern: "data/loteria_historial.csv docs/data/kino_metrics.json docs/data/pozos.json data/kino_suggestions_pending.json data/suggestions_history.csv docs/data/suggestions_history.json docs/data/suggestions_detail.json data/jugadas.json docs/data/historial_index.json"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
