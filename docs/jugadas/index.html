<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mis Jugadas · kino-loto</title>
  <link rel="icon" type="image/png" href="../favicon.png" />
  <style>
    :root {
      --bg: #0f1117; --card: #1a1d27; --border: #2a2d3e;
      --text: #e2e8f0; --muted: #8892a4;
      --accent: #f59e0b; --green: #22c55e; --red: #ef4444; --blue: #3b82f6;
      --radius: 12px; --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

    header {
      padding: 16px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 16px;
    }
    header a { color: var(--muted); text-decoration: none; font-size: 0.9rem; }
    header a:hover { color: var(--text); }
    header h1 { font-size: 1.2rem; font-weight: 700; color: var(--accent); }

    main { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

    .stats {
      display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 32px;
    }
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 24px; flex: 1; min-width: 120px;
    }
    .stat-card .val { font-size: 2rem; font-weight: 800; color: var(--accent); line-height: 1; }
    .stat-card .lbl { font-size: 0.78rem; color: var(--muted); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.05em; }

    .wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }

    table { width: 100%; border-collapse: collapse; background: var(--card); }
    thead th {
      background: #12151f; padding: 12px 16px;
      text-align: left; font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted);
      border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.03); }
    tbody td { padding: 12px 16px; font-size: 0.88rem; vertical-align: middle; }

    .tag {
      display: inline-block; padding: 3px 9px; border-radius: 9999px;
      font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em;
      background: rgba(245,158,11,0.15); color: var(--accent);
      border: 1px solid rgba(245,158,11,0.3);
    }
    .tag.kino {
      background: rgba(59,130,246,0.15); color: #60a5fa;
      border-color: rgba(59,130,246,0.3);
    }

    .variantes { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }

    .nums { display: flex; flex-wrap: wrap; gap: 4px; min-width: 140px; }
    .bola {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.68rem; font-weight: 700; flex-shrink: 0;
    }
    .bola-loto { background: rgba(245,158,11,0.15); color: var(--accent); border: 1px solid rgba(245,158,11,0.35); }
    .bola-kino { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.35); }
    .bola-match { background: rgba(34,197,94,0.2); color: var(--green); border-color: rgba(34,197,94,0.5); }

    .aciertos-ok { color: var(--green); font-weight: 700; font-size: 1rem; }
    .aciertos-cero { color: var(--muted); font-weight: 600; }
    .aciertos-pending { color: var(--muted); font-style: italic; font-size: 0.82rem; }

    .rango { font-size: 0.8rem; color: var(--muted); }
    .fecha { color: var(--muted); font-size: 0.83rem; white-space: nowrap; }
    .sorteo-num { font-weight: 700; }

    .empty { text-align: center; padding: 60px 24px; color: var(--muted); }
    .loading { text-align: center; padding: 60px 24px; color: var(--muted); }

    @media (max-width: 680px) {
      main { padding: 20px 12px; }
      tbody td, thead th { padding: 10px 10px; }
      .nums { min-width: 100px; }
    }
  </style>
</head>
<body>

<header>
  <a href="../">← Inicio</a>
  <h1>Mis Jugadas</h1>
</header>

<main>
  <div class="stats" id="stats"></div>
  <div class="wrap">
    <table>
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Sorteo</th>
          <th>Juego / Variantes</th>
          <th>Números jugados</th>
          <th>Sugerencia</th>
          <th>Aciertos</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="6" class="loading">Cargando…</td></tr>
      </tbody>
    </table>
  </div>
</main>

<script>
function getToken() {
  const hash = location.hash;
  if (hash.startsWith('#setup=')) {
    localStorage.setItem('kl_gh_token', hash.slice(7).trim());
    history.replaceState(null, '', location.pathname + location.search);
  }
  const stored = localStorage.getItem('kl_gh_token');
  if (!stored) return '';
  try {
    const b64 = stored.trim().replace(/-/g, '+').replace(/_/g, '/');
    const padded = b64 + '==='.slice(0, (4 - b64.length % 4) % 4);
    return atob(padded);
  } catch { return ''; }
}

async function loadJugadas() {
  const headers = { Accept: 'application/vnd.github+json' };
  const token = getToken();
  if (token) headers.Authorization = `Bearer ${token}`;
  const r = await fetch(
    'https://api.github.com/repos/GaboAzorin/kin-lo/contents/data/jugadas.json',
    { headers, cache: 'no-store' }
  );
  if (!r.ok) return [];
  const d = await r.json();
  return JSON.parse(atob(d.content.replace(/\n/g, '')));
}

const VARIANTE_LABEL = {
  loto: 'Loto', kino: 'Kino',
  recargado: 'Recargado', revancha: 'Revancha',
  rekino: 'ReKino', requetekino: 'RequeteKino',
};

function renderStats(jugadas) {
  const total = jugadas.length;
  const loto  = jugadas.filter(j => j.juego === 'loto').length;
  const kino  = jugadas.filter(j => j.juego === 'kino').length;
  const evaluadas = jugadas.filter(j => j.aciertos != null);
  const pendientes = total - evaluadas.length;
  const mejorLoto = evaluadas.filter(j=>j.juego==='loto').reduce((m,j)=>Math.max(m,j.aciertos), -1);
  const mejorKino = evaluadas.filter(j=>j.juego==='kino').reduce((m,j)=>Math.max(m,j.aciertos), -1);

  let cards = `
    <div class="stat-card"><div class="val">${total}</div><div class="lbl">Total jugadas</div></div>
    <div class="stat-card"><div class="val">${loto}</div><div class="lbl">Loto</div></div>
    <div class="stat-card"><div class="val">${kino}</div><div class="lbl">Kino</div></div>
    <div class="stat-card"><div class="val">${pendientes}</div><div class="lbl">Pendientes</div></div>
  `;
  if (mejorLoto >= 0) cards += `<div class="stat-card"><div class="val">${mejorLoto}/6</div><div class="lbl">Mejor Loto</div></div>`;
  if (mejorKino >= 0) cards += `<div class="stat-card"><div class="val">${mejorKino}/14</div><div class="lbl">Mejor Kino</div></div>`;
  document.getElementById('stats').innerHTML = cards;
}

function renderRow(j) {
  const esKino   = j.juego === 'kino';
  const bolaCls  = esKino ? 'bola-kino' : 'bola-loto';
  const tagCls   = esKino ? 'tag kino' : 'tag';
  const variantes = j.variantes || [j.juego];

  const numsHTML = (j.numeros || []).map(n => `<div class="bola ${bolaCls}">${n}</div>`).join('');

  const extrasHTML = variantes.length > 1
    ? `<div class="variantes">+ ${variantes.slice(1).map(v => VARIANTE_LABEL[v] || v).join(' + ')}</div>`
    : '';

  let aciertosHTML;
  if (j.aciertos == null) {
    aciertosHTML = '<span class="aciertos-pending">Pendiente</span>';
  } else if (j.aciertos === 0) {
    aciertosHTML = `<span class="aciertos-cero">0 / ${j.numeros?.length ?? (esKino ? 14 : 6)}</span>`;
  } else {
    aciertosHTML = `<span class="aciertos-ok">${j.aciertos} / ${j.numeros?.length ?? (esKino ? 14 : 6)}</span>`;
  }

  return `<tr>
    <td class="fecha">${j.fecha_jugada || '—'}</td>
    <td><span class="sorteo-num">#${j.sorteo}</span></td>
    <td>
      <span class="${tagCls}">${VARIANTE_LABEL[j.juego] || j.juego}</span>
      ${extrasHTML}
    </td>
    <td><div class="nums">${numsHTML}</div></td>
    <td class="rango">${j.rango_sugerencia || '—'}</td>
    <td>${aciertosHTML}</td>
  </tr>`;
}

loadJugadas().then(jugadas => {
  if (!jugadas.length) {
    document.getElementById('tbody').innerHTML =
      '<tr><td colspan="6" class="empty">No hay jugadas registradas aún.</td></tr>';
    document.getElementById('stats').innerHTML = '';
    return;
  }
  const sorted = [...jugadas].sort((a, b) => b.sorteo - a.sorteo || b.juego.localeCompare(a.juego));
  renderStats(jugadas);
  document.getElementById('tbody').innerHTML = sorted.map(renderRow).join('');
}).catch(() => {
  document.getElementById('tbody').innerHTML =
    '<tr><td colspan="6" class="empty">Error al cargar los datos.</td></tr>';
});
</script>

</body>
</html>
