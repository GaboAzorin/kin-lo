<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mis Jugadas · kino-loto</title>
  <link rel="icon" type="image/png" href="../favicon.png" />
  <style>
    :root {
      --bg: #0f1117; --card: #1a1d27; --border: #2a2d3e;
      --text: #e2e8f0; --muted: #8892a4;
      --accent: #f59e0b; --green: #22c55e; --red: #ef4444; --blue: #3b82f6;
      --radius: 12px; --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

    header {
      padding: 16px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 16px;
    }
    header a { color: var(--muted); text-decoration: none; font-size: 0.9rem; }
    header a:hover { color: var(--text); }
    header h1 { font-size: 1.2rem; font-weight: 700; color: var(--accent); }

    main { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

    /* ── Stats ── */
    .stats { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 28px; }
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 24px; flex: 1; min-width: 110px;
    }
    .stat-card .val { font-size: 2rem; font-weight: 800; color: var(--accent); line-height: 1; }
    .stat-card .lbl { font-size: 0.78rem; color: var(--muted); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.05em; }

    /* ── Form toggle button ── */
    .btn-add {
      display: flex; align-items: center; gap: 8px;
      background: var(--accent); color: #000; border: none; border-radius: 8px;
      padding: 9px 18px; font-size: 0.88rem; font-weight: 700; cursor: pointer;
      margin-bottom: 20px; transition: opacity 0.15s;
    }
    .btn-add:hover { opacity: 0.85; }

    /* ── Form panel ── */
    .form-panel {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px; margin-bottom: 28px;
    }
    .form-panel h2 { font-size: 0.95rem; font-weight: 700; margin-bottom: 20px; color: var(--accent); }

    .form-row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 18px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 140px; }
    .form-group label { font-size: 0.78rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

    .radio-tabs { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .radio-tabs input { display: none; }
    .radio-tabs label {
      flex: 1; text-align: center; padding: 8px 12px;
      font-size: 0.85rem; font-weight: 600; cursor: pointer; color: var(--muted);
      transition: background 0.15s, color 0.15s; text-transform: none; letter-spacing: 0;
    }
    .radio-tabs input:checked + label { background: var(--accent); color: #000; }

    input[type="number"], input[type="date"], input[type="text"] {
      background: #12151f; border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); padding: 9px 12px; font-size: 0.9rem; font-family: var(--font);
      width: 100%; outline: none; transition: border-color 0.15s;
    }
    input:focus { border-color: var(--accent); }
    input.invalid { border-color: var(--red); }
    input.valid   { border-color: var(--green); }

    .check-group { display: flex; flex-wrap: wrap; gap: 10px; }
    .check-group label {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.85rem; font-weight: 500; cursor: pointer;
      color: var(--text); text-transform: none; letter-spacing: 0;
    }
    .check-group label.disabled { color: var(--muted); cursor: not-allowed; }
    .check-group input[type="checkbox"] { accent-color: var(--accent); width: 15px; height: 15px; }

    .nums-hint { font-size: 0.78rem; margin-top: 4px; color: var(--muted); min-height: 18px; }
    .nums-hint.ok   { color: var(--green); }
    .nums-hint.bad  { color: var(--red); }

    .form-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }
    .btn-cancel {
      background: transparent; border: 1px solid var(--border); border-radius: 8px;
      color: var(--muted); padding: 9px 18px; font-size: 0.88rem; cursor: pointer;
    }
    .btn-cancel:hover { border-color: var(--text); color: var(--text); }
    .btn-submit {
      background: var(--green); color: #000; border: none; border-radius: 8px;
      padding: 9px 22px; font-size: 0.88rem; font-weight: 700; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-submit:hover { opacity: 0.85; }
    .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Table ── */
    .wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; background: var(--card); }
    thead th {
      background: #12151f; padding: 12px 16px;
      text-align: left; font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted);
      border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.03); }
    tbody td { padding: 12px 16px; font-size: 0.88rem; vertical-align: middle; }

    .tag {
      display: inline-block; padding: 3px 9px; border-radius: 9999px;
      font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em;
      background: rgba(245,158,11,0.15); color: var(--accent); border: 1px solid rgba(245,158,11,0.3);
    }
    .tag.kino { background: rgba(59,130,246,0.15); color: #60a5fa; border-color: rgba(59,130,246,0.3); }

    .variantes { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
    .nums { display: flex; flex-wrap: wrap; gap: 4px; min-width: 140px; }
    .bola {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.68rem; font-weight: 700; flex-shrink: 0;
    }
    .bola-loto { background: rgba(245,158,11,0.15); color: var(--accent); border: 1px solid rgba(245,158,11,0.35); }
    .bola-kino { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.35); }

    .aciertos-ok   { color: var(--green); font-weight: 700; font-size: 1rem; }
    .aciertos-cero { color: var(--muted); font-weight: 600; }
    .aciertos-pending { color: var(--muted); font-style: italic; font-size: 0.82rem; }
    .manual-tag { font-size: 0.7rem; color: var(--muted); margin-left: 4px; }

    .rango { font-size: 0.8rem; color: var(--muted); }
    .fecha { color: var(--muted); font-size: 0.83rem; white-space: nowrap; }
    .sorteo-num { font-weight: 700; }

    .empty, .loading { text-align: center; padding: 60px 24px; color: var(--muted); }

    @media (max-width: 680px) {
      main { padding: 20px 12px; }
      tbody td, thead th { padding: 10px 10px; }
      .nums { min-width: 100px; }
      .form-row { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <a href="../">← Inicio</a>
  <h1>Mis Jugadas</h1>
</header>

<main>
  <div class="stats" id="stats"></div>

  <button class="btn-add" id="btn-toggle-form">＋ Agregar jugada</button>

  <!-- ── Formulario ── -->
  <div class="form-panel" id="form-panel" style="display:none">
    <h2>Nueva jugada</h2>

    <div class="form-row">
      <div class="form-group" style="max-width:200px">
        <label>Juego</label>
        <div class="radio-tabs">
          <input type="radio" name="juego" id="r-loto" value="loto" checked>
          <label for="r-loto">Loto</label>
          <input type="radio" name="juego" id="r-kino" value="kino">
          <label for="r-kino">Kino</label>
        </div>
      </div>
      <div class="form-group" style="max-width:160px">
        <label>Sorteo #</label>
        <input type="number" id="f-sorteo" min="1" placeholder="ej: 5431">
      </div>
      <div class="form-group" style="max-width:180px">
        <label>Fecha jugada</label>
        <input type="date" id="f-fecha">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Variantes</label>
        <div class="check-group" id="variantes-checks"></div>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label id="nums-label">Números <span style="font-weight:400;text-transform:none">(6 de 1–41)</span></label>
        <input type="text" id="f-nums" placeholder="ej: 1, 5, 30, 32, 34, 41" autocomplete="off">
        <div class="nums-hint" id="nums-hint"></div>
      </div>
    </div>

    <div class="form-actions">
      <button class="btn-cancel" id="btn-cancel">Cancelar</button>
      <button class="btn-submit" id="btn-submit" disabled>Registrar</button>
    </div>
  </div>

  <!-- ── Tabla ── -->
  <div class="wrap">
    <table>
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Sorteo</th>
          <th>Juego / Variantes</th>
          <th>Números jugados</th>
          <th>Origen</th>
          <th>Aciertos</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="6" class="loading">Cargando…</td></tr>
      </tbody>
    </table>
  </div>
</main>

<script>
// ── GitHub API ────────────────────────────────────────────────────────────────
const GH_OWNER = 'GaboAzorin', GH_REPO = 'kin-lo', GH_FILE = 'data/jugadas.json';

function getToken() {
  const hash = location.hash;
  if (hash.startsWith('#setup=')) {
    localStorage.setItem('kl_gh_token', hash.slice(7).trim());
    history.replaceState(null, '', location.pathname + location.search);
  }
  const stored = localStorage.getItem('kl_gh_token');
  if (!stored) return '';
  try {
    const b64 = stored.trim().replace(/-/g, '+').replace(/_/g, '/');
    return atob(b64 + '==='.slice(0, (4 - b64.length % 4) % 4));
  } catch { return ''; }
}

async function ghGetFile() {
  const token = getToken();
  const headers = { Accept: 'application/vnd.github+json' };
  if (token) headers.Authorization = `Bearer ${token}`;
  const r = await fetch(
    `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}`,
    { headers, cache: 'no-store' }
  );
  if (r.status === 404) return { content: [], sha: null };
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.message || `GitHub ${r.status}`); }
  const d = await r.json();
  return { content: JSON.parse(atob(d.content.replace(/\n/g, ''))), sha: d.sha };
}

async function ghPutFile(content, sha, msg) {
  const token = getToken();
  if (!token) throw new Error('Token no configurado');
  const body = { message: msg, content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))) };
  if (sha) body.sha = sha;
  const r = await fetch(
    `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}`,
    { method: 'PUT',
      headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
      body: JSON.stringify(body) }
  );
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.message || `GitHub ${r.status}`); }
}

// ── Render tabla ──────────────────────────────────────────────────────────────
const LABEL = { loto:'Loto', kino:'Kino', recargado:'Recargado', revancha:'Revancha', rekino:'ReKino', requetekino:'RequeteKino' };

function renderStats(jugadas) {
  const total    = jugadas.length;
  const nLoto    = jugadas.filter(j => j.juego === 'loto').length;
  const nKino    = jugadas.filter(j => j.juego === 'kino').length;
  const evaluadas  = jugadas.filter(j => j.aciertos != null);
  const pendientes = total - evaluadas.length;
  const mejorLoto  = evaluadas.filter(j=>j.juego==='loto').reduce((m,j)=>Math.max(m,j.aciertos), -1);
  const mejorKino  = evaluadas.filter(j=>j.juego==='kino').reduce((m,j)=>Math.max(m,j.aciertos), -1);
  let html = `
    <div class="stat-card"><div class="val">${total}</div><div class="lbl">Total jugadas</div></div>
    <div class="stat-card"><div class="val">${nLoto}</div><div class="lbl">Loto</div></div>
    <div class="stat-card"><div class="val">${nKino}</div><div class="lbl">Kino</div></div>
    <div class="stat-card"><div class="val">${pendientes}</div><div class="lbl">Pendientes</div></div>`;
  if (mejorLoto >= 0) html += `<div class="stat-card"><div class="val">${mejorLoto}/6</div><div class="lbl">Mejor Loto</div></div>`;
  if (mejorKino >= 0) html += `<div class="stat-card"><div class="val">${mejorKino}/14</div><div class="lbl">Mejor Kino</div></div>`;
  document.getElementById('stats').innerHTML = html;
}

function renderRow(j) {
  const esKino  = j.juego === 'kino';
  const bolaCls = esKino ? 'bola-kino' : 'bola-loto';
  const tagCls  = esKino ? 'tag kino' : 'tag';
  const variantes = j.variantes || [j.juego];
  const numsHTML  = (j.numeros || []).map(n => `<div class="bola ${bolaCls}">${n}</div>`).join('');
  const extrasHTML = variantes.length > 1
    ? `<div class="variantes">+ ${variantes.slice(1).map(v=>LABEL[v]||v).join(' + ')}</div>` : '';
  const origenHTML = j.rango_sugerencia
    ? `<span class="rango">${j.rango_sugerencia}</span>`
    : `<span class="manual-tag">Manual</span>`;
  let aciertosHTML;
  if (j.aciertos == null) aciertosHTML = '<span class="aciertos-pending">Pendiente</span>';
  else if (j.aciertos === 0) aciertosHTML = `<span class="aciertos-cero">0 / ${j.numeros?.length ?? (esKino?14:6)}</span>`;
  else aciertosHTML = `<span class="aciertos-ok">${j.aciertos} / ${j.numeros?.length ?? (esKino?14:6)}</span>`;

  return `<tr>
    <td class="fecha">${j.fecha_jugada||'—'}</td>
    <td><span class="sorteo-num">#${j.sorteo}</span></td>
    <td><span class="${tagCls}">${LABEL[j.juego]||j.juego}</span>${extrasHTML}</td>
    <td><div class="nums">${numsHTML}</div></td>
    <td>${origenHTML}</td>
    <td>${aciertosHTML}</td>
  </tr>`;
}

let allJugadas = [];

function refreshTable() {
  if (!allJugadas.length) {
    document.getElementById('tbody').innerHTML = '<tr><td colspan="6" class="empty">No hay jugadas registradas aún.</td></tr>';
    document.getElementById('stats').innerHTML = '';
    return;
  }
  const sorted = [...allJugadas].sort((a,b) => b.sorteo - a.sorteo || b.juego.localeCompare(a.juego));
  renderStats(allJugadas);
  document.getElementById('tbody').innerHTML = sorted.map(renderRow).join('');
}

// ── Formulario ────────────────────────────────────────────────────────────────
const VARIANTES_LOTO = [
  { val: 'recargado', lbl: 'Recargado', requires: null },
  { val: 'revancha',  lbl: 'Revancha',  requires: 'recargado' },
];
const VARIANTES_KINO = [
  { val: 'rekino',      lbl: 'ReKino',       requires: null },
  { val: 'requetekino', lbl: 'RequeteKino',  requires: 'rekino' },
];

function getJuego() { return document.querySelector('input[name="juego"]:checked').value; }

function renderVarianteChecks() {
  const list = getJuego() === 'loto' ? VARIANTES_LOTO : VARIANTES_KINO;
  document.getElementById('variantes-checks').innerHTML = list.map(v => `
    <label class="${v.requires ? 'sub' : ''}" id="lbl-${v.val}">
      <input type="checkbox" id="chk-${v.val}" value="${v.val}" ${v.requires ? 'disabled' : ''}>
      ${v.lbl}
    </label>`).join('');

  // enforce hierarchy on change
  list.forEach(v => {
    if (!v.requires) {
      document.getElementById(`chk-${v.val}`).addEventListener('change', () => {
        const child = list.find(c => c.requires === v.val);
        if (!child) return;
        const chkParent = document.getElementById(`chk-${v.val}`);
        const chkChild  = document.getElementById(`chk-${child.val}`);
        const lblChild  = document.getElementById(`lbl-${child.val}`);
        if (!chkParent.checked) { chkChild.checked = false; chkChild.disabled = true; lblChild.classList.add('disabled'); }
        else { chkChild.disabled = false; lblChild.classList.remove('disabled'); }
      });
    }
  });
}

function updateNumsHint() {
  const juego   = getJuego();
  const maxNums = juego === 'kino' ? 14 : 6;
  const maxVal  = juego === 'kino' ? 25 : 41;
  document.getElementById('nums-label').innerHTML =
    `Números <span style="font-weight:400;text-transform:none">(${maxNums} de 1–${maxVal})</span>`;
  document.getElementById('f-nums').placeholder =
    juego === 'kino' ? 'ej: 1, 3, 7, 10, 12, 14, 16, 18, 19, 20, 21, 22, 23, 25' : 'ej: 1, 5, 30, 32, 34, 41';
  validateNums();
}

function parseNums() {
  return document.getElementById('f-nums').value
    .split(/[\s,;]+/).map(s => parseInt(s, 10)).filter(n => !isNaN(n));
}

function validateNums() {
  const juego   = getJuego();
  const maxNums = juego === 'kino' ? 14 : 6;
  const maxVal  = juego === 'kino' ? 25 : 41;
  const nums    = parseNums();
  const hint    = document.getElementById('nums-hint');
  const input   = document.getElementById('f-nums');

  if (!document.getElementById('f-nums').value.trim()) {
    hint.textContent = ''; hint.className = 'nums-hint';
    input.classList.remove('valid', 'invalid');
    document.getElementById('btn-submit').disabled = true; return;
  }
  const outOfRange = nums.filter(n => n < 1 || n > maxVal);
  const dupes = nums.length !== new Set(nums).size;

  if (outOfRange.length) {
    hint.textContent = `Números fuera de rango (1–${maxVal}): ${outOfRange.join(', ')}`;
    hint.className = 'nums-hint bad'; input.classList.add('invalid'); input.classList.remove('valid');
    document.getElementById('btn-submit').disabled = true;
  } else if (dupes) {
    hint.textContent = 'Hay números repetidos'; hint.className = 'nums-hint bad';
    input.classList.add('invalid'); input.classList.remove('valid');
    document.getElementById('btn-submit').disabled = true;
  } else if (nums.length !== maxNums) {
    hint.textContent = `${nums.length} / ${maxNums} números`;
    hint.className = 'nums-hint'; input.classList.remove('valid', 'invalid');
    document.getElementById('btn-submit').disabled = true;
  } else {
    hint.textContent = `${maxNums} / ${maxNums} ✓`; hint.className = 'nums-hint ok';
    input.classList.add('valid'); input.classList.remove('invalid');
    document.getElementById('btn-submit').disabled = false;
  }
}

function getVariantes() {
  const juego  = getJuego();
  const vs     = [juego];
  const list   = juego === 'loto' ? VARIANTES_LOTO : VARIANTES_KINO;
  list.forEach(v => { const chk = document.getElementById(`chk-${v.val}`); if (chk && chk.checked) vs.push(v.val); });
  return vs;
}

function openForm() {
  document.getElementById('form-panel').style.display = 'block';
  document.getElementById('btn-toggle-form').style.display = 'none';
  // default date = today
  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('f-fecha').value = today;
  renderVarianteChecks();
  updateNumsHint();
}

function closeForm() {
  document.getElementById('form-panel').style.display = 'none';
  document.getElementById('btn-toggle-form').style.display = 'flex';
  // reset
  document.getElementById('f-sorteo').value = '';
  document.getElementById('f-nums').value = '';
  document.getElementById('r-loto').checked = true;
  document.getElementById('nums-hint').textContent = '';
  document.getElementById('f-nums').classList.remove('valid','invalid');
  document.getElementById('btn-submit').disabled = true;
  renderVarianteChecks();
  updateNumsHint();
}

async function submitJugada() {
  const juego   = getJuego();
  const sorteo  = parseInt(document.getElementById('f-sorteo').value, 10);
  const fechaRaw = document.getElementById('f-fecha').value; // yyyy-mm-dd
  const [y, m, d] = fechaRaw.split('-');
  const fecha   = `${d}-${m}-${y}`;
  const numeros = parseNums();
  const variantes = getVariantes();

  if (!sorteo || sorteo < 1) { alert('Ingresa un número de sorteo válido.'); return; }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true; btn.textContent = 'Guardando…';

  try {
    const { content, sha } = await ghGetFile();
    const key = [...numeros].sort((a,b)=>a-b).join(',');
    const dup = content.some(j => j.juego===juego && j.sorteo===sorteo &&
      [...j.numeros].sort((a,b)=>a-b).join(',')===key);
    if (!dup) {
      content.push({ fecha_jugada: fecha, juego, variantes, sorteo, numeros, rango_sugerencia: null, aciertos: null });
      await ghPutFile(content, sha, `jugada manual: ${juego} #${sorteo}`);
      allJugadas = content;
      refreshTable();
    }
    closeForm();
  } catch(e) {
    alert('Error al guardar: ' + e.message);
    btn.disabled = false; btn.textContent = 'Registrar';
  }
}

// ── Event listeners ───────────────────────────────────────────────────────────
document.getElementById('btn-toggle-form').addEventListener('click', openForm);
document.getElementById('btn-cancel').addEventListener('click', closeForm);
document.getElementById('btn-submit').addEventListener('click', submitJugada);
document.getElementById('f-nums').addEventListener('input', validateNums);
document.querySelectorAll('input[name="juego"]').forEach(r => r.addEventListener('change', () => {
  renderVarianteChecks(); updateNumsHint();
}));

// ── Carga inicial ─────────────────────────────────────────────────────────────
ghGetFile().then(({ content }) => {
  allJugadas = content;
  refreshTable();
}).catch(() => {
  document.getElementById('tbody').innerHTML =
    '<tr><td colspan="6" class="empty">Error al cargar los datos.</td></tr>';
});
</script>

</body>
</html>
